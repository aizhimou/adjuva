server:
  port: 9090
spring:
  application:
    name: adjuva-backend
  datasource:
    url: jdbc:h2:file:./data/adjuva;AUTO_SERVER=TRUE;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: adjuva
    password: Adjuva@666
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      id-type: assign_uuid

db-scheduler:
  enabled: true
  table-name: scheduled_tasks
  polling-interval: 10s
  threads: 4
  shutdown-max-wait: 30s
  immediate-execution-enabled: false



adjuva:
  api-base-url: http://localhost:9090
  executor:
    enabled: true
  codex:
    bin: codex
  mock:
    wait-timeout-seconds: 300
